kind = "web"
previewPath = "/"
title = "Pixel Technologies"
version = "1.0.0"
id = "artifacts/pixel-tech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20926

[services.development]
run = "pnpm --filter @workspace/pixel-tech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pixel-tech", "run", "build" ]
publicDir = "artifacts/pixel-tech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20926"
BASE_PATH = "/"
